<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Maps Standalone Diagnostic Test</title>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; background: #0b0f17; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #status { padding: 16px; background: #111827; border-bottom: 1px solid #374151; font-size: 0.95rem; line-height: 1.5; }
    #log { padding: 12px 16px; background: #000; font-family: monospace; font-size: 0.82rem; max-height: 160px; overflow-y: auto; color: #9ca3af; border-bottom: 1px solid #374151; }
    #map { width: 100%; height: calc(100% - 230px); min-height: 350px; background: #1f2937; }
    .success { background: #064e3b !important; color: #6ee7b7 !important; }
    .error { background: #450a0a !important; color: #fca5a5 !important; }
    .warn { background: #451a03 !important; color: #fde047 !important; }
    code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-family: monospace; }
  </style>
</head>
<body>
  <div id="status">⏳ Diagnostic Engine Starting...</div>
  <div id="log"></div>
  <div id="map"></div>

  <script src="config.js" onerror="window.configFailed = true;"></script>
  
  <script>
    function log(msg) {
      console.log(msg);
      const logDiv = document.getElementById("log");
      if (logDiv) {
        logDiv.innerHTML += "<div>" + new Date().toLocaleTimeString() + " — " + msg + "</div>";
        logDiv.scrollTop = logDiv.scrollHeight;
      }
    }

    function getStatusEl() {
      return document.getElementById("status");
    }

    window.gm_authFailure = function() {
      log("❌ window.gm_authFailure triggered by Google!");
      const statusEl = getStatusEl();
      if (statusEl) {
        statusEl.className = "error";
        statusEl.innerHTML = "❌ <strong>Google API Key Authentication Failure!</strong><br>Google Cloud rejected this API Key. Check:<br>1. <strong>Maps JavaScript API</strong> must be enabled in Google Cloud Console.<br>2. <strong>Billing Account</strong> must be linked to your Google Cloud project.<br>3. <strong>API Key Restrictions</strong>: Ensure HTTP Referrer restrictions allow your current URL.";
      }
    };

    function runDiagnosticTest() {
      log("Initializing Diagnostic Runner...");
      const statusEl = getStatusEl();

      if (window.configFailed || typeof CONFIG === "undefined") {
        log("⚠️ config.js not found or failed to load.");
        if (statusEl) {
          statusEl.className = "warn";
          statusEl.innerHTML = "⚠️ <strong>config.js is missing or failed to load.</strong><br>If running on Vercel: Ensure <code>GOOGLE_MAPS_API_KEY</code> environment variable is set.<br>If running locally: Ensure <code>config.js</code> exists in the project root.";
        }
        return;
      }

      const apiKey = (CONFIG.GOOGLE_MAPS_API_KEY || "").trim();
      if (!apiKey) {
        log("⚠️ CONFIG.GOOGLE_MAPS_API_KEY is empty.");
        if (statusEl) {
          statusEl.className = "warn";
          statusEl.innerHTML = "⚠️ <strong>CONFIG.GOOGLE_MAPS_API_KEY is blank.</strong> Add your Google Maps API Key to <code>config.js</code>.";
        }
        return;
      }

      log("🔑 API Key detected: " + apiKey.substring(0, 8) + "..." + apiKey.substring(apiKey.length - 4));
      if (statusEl) {
        statusEl.innerHTML = "🔑 API Key Detected (" + apiKey.substring(0, 8) + "...). Fetching Google Maps CDN Script...";
      }

      // Inject Google Maps Script
      const script = document.createElement("script");
      script.src = "https://maps.googleapis.com/maps/api/js?key=" + encodeURIComponent(apiKey) + "&libraries=places&callback=initTestMap&loading=async";
      script.async = true;
      script.defer = true;
      
      script.onerror = function(err) {
        log("❌ Script onerror triggered. Failed to reach maps.googleapis.com");
        if (statusEl) {
          statusEl.className = "error";
          statusEl.innerHTML = "❌ <strong>Network / CDN Error!</strong> Browser failed to fetch script from <code>maps.googleapis.com</code>. Check internet connection or ad-blockers.";
        }
      };

      log("Injecting script tag into head...");
      document.head.appendChild(script);
    }

    function initTestMap() {
      log("✅ initTestMap callback invoked by Google Maps!");
      const statusEl = getStatusEl();
      try {
        const mapEl = document.getElementById("map");
        const map = new google.maps.Map(mapEl, {
          center: { lat: 1.29027, lng: 103.85195 },
          zoom: 14,
          disableDefaultUI: false
        });

        new google.maps.Marker({
          position: { lat: 1.29027, lng: 103.85195 },
          map: map,
          title: "Test Marker"
        });

        log("✅ google.maps.Map instance created successfully.");
        if (statusEl) {
          statusEl.className = "success";
          statusEl.innerHTML = "✅ <strong>SUCCESS! Google Maps is 100% Active & Rendering!</strong>";
        }
      } catch (err) {
        log("❌ Error inside initTestMap: " + err.message);
        if (statusEl) {
          statusEl.className = "error";
          statusEl.innerHTML = "❌ <strong>JavaScript Map Error:</strong> " + err.message;
        }
      }
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", runDiagnosticTest);
    } else {
      runDiagnosticTest();
    }
  </script>
</body>
</html>
