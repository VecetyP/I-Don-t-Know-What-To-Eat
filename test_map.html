<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Google Maps Standalone Diagnostic Test</title>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; }
    #status { padding: 12px; background: #111; border-bottom: 1px solid #333; }
    #map { width: 100%; height: calc(100% - 50px); }
  </style>
  <script src="config.js"></script>
</head>
<body>
  <div id="status">⏳ Initializing Google Maps API test...</div>
  <div id="map"></div>

  <script>
    const statusEl = document.getElementById("status");
    
    window.gm_authFailure = function() {
      statusEl.innerHTML = "❌ <strong>Google Auth Failure!</strong> Check Google Cloud Console API Key restrictions or Billing activation.";
      statusEl.style.background = "#450a0a";
      statusEl.style.color = "#fca5a5";
    };

    if (typeof CONFIG === "undefined" || !CONFIG.GOOGLE_MAPS_API_KEY) {
      statusEl.innerHTML = "⚠️ <strong>No CONFIG.GOOGLE_MAPS_API_KEY found in config.js!</strong>";
    } else {
      statusEl.innerHTML = "🔑 Key Found (" + CONFIG.GOOGLE_MAPS_API_KEY.substring(0, 8) + "...). Fetching Google Maps Script...";
      
      const script = document.createElement("script");
      script.src = "https://maps.googleapis.com/maps/api/js?key=" + encodeURIComponent(CONFIG.GOOGLE_MAPS_API_KEY.trim()) + "&libraries=places&callback=initTestMap";
      script.async = true;
      script.defer = true;
      script.onerror = function() {
        statusEl.innerHTML = "❌ <strong>Network / CDN Error!</strong> Failed to load script from maps.googleapis.com.";
      };
      document.head.appendChild(script);
    }

    function initTestMap() {
      try {
        const map = new google.maps.Map(document.getElementById("map"), {
          center: { lat: 1.29027, lng: 103.85195 },
          zoom: 14
        });
        statusEl.innerHTML = "✅ <strong>SUCCESS!</strong> Google Maps rendered successfully.";
        statusEl.style.background = "#064e3b";
        statusEl.style.color = "#6ee7b7";
      } catch (err) {
        statusEl.innerHTML = "❌ <strong>JavaScript Error:</strong> " + err.message;
      }
    }
  </script>
</body>
</html>
